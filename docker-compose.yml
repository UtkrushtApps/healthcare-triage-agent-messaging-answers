services:
  redis:
    image: redis:7-alpine
    container_name: triage-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  agent-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: triage-agent-app
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      redis:
        condition: service_healthy

